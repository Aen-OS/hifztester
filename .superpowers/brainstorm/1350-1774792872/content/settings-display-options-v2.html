<h2>Settings Screen — Display Options (Compact)</h2>
<p class="subtitle">Both controls on a single line</p>

<div class="mockup">
  <div class="mockup-header">AyahFlow Settings — Display Options Section</div>
  <div class="mockup-body" style="padding: 24px; background: #fff; font-family: system-ui, sans-serif;">

    <!-- Section heading -->
    <div style="margin-bottom: 16px;">
      <h3 style="font-size: 16px; font-weight: 600; color: #111; margin: 0 0 4px 0;">Display Options</h3>
      <p style="font-size: 13px; color: #6b7280; margin: 0;">Choose what to show alongside the Arabic text</p>
    </div>

    <!-- Single line: Translation + Transliteration -->
    <div style="display: flex; gap: 10px;">

      <!-- Translation control -->
      <div style="flex: 1; display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border: 1px solid #e5e7eb; border-radius: 12px; background: #fff;">
        <div style="display: flex; align-items: center; gap: 10px;">
          <!-- Toggle (on state) -->
          <div style="width: 40px; height: 22px; background: #111827; border-radius: 11px; position: relative; cursor: pointer; flex-shrink: 0;">
            <div style="width: 16px; height: 16px; background: white; border-radius: 50%; position: absolute; top: 3px; right: 3px; box-shadow: 0 1px 2px rgba(0,0,0,0.1);"></div>
          </div>
          <span style="font-size: 13px; font-weight: 500; color: #111;">Translation</span>
        </div>
        <select style="padding: 4px 24px 4px 8px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 12px; color: #374151; background: #f9fafb; appearance: auto; cursor: pointer;">
          <option>Sahih International</option>
          <option>Hilali & Khan</option>
        </select>
      </div>

      <!-- Transliteration control -->
      <div style="display: flex; align-items: center; gap: 10px; padding: 12px 14px; border: 1px solid #e5e7eb; border-radius: 12px; background: #fff;">
        <!-- Toggle (off state) -->
        <div style="width: 40px; height: 22px; background: #d1d5db; border-radius: 11px; position: relative; cursor: pointer; flex-shrink: 0;">
          <div style="width: 16px; height: 16px; background: white; border-radius: 50%; position: absolute; top: 3px; left: 3px; box-shadow: 0 1px 2px rgba(0,0,0,0.1);"></div>
        </div>
        <span style="font-size: 13px; font-weight: 500; color: #111;">Transliteration</span>
      </div>

    </div>

    <!-- Off state preview -->
    <div style="margin-top: 24px; padding-top: 20px; border-top: 1px dashed #e5e7eb;">
      <p style="font-size: 12px; color: #9ca3af; margin: 0 0 12px 0; text-transform: uppercase; letter-spacing: 0.05em;">When translation is toggled off:</p>
      <div style="display: flex; gap: 10px;">
        <div style="flex: 1; display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border: 1px solid #e5e7eb; border-radius: 12px; background: #f9fafb;">
          <div style="display: flex; align-items: center; gap: 10px;">
            <div style="width: 40px; height: 22px; background: #d1d5db; border-radius: 11px; position: relative; cursor: pointer; flex-shrink: 0;">
              <div style="width: 16px; height: 16px; background: white; border-radius: 50%; position: absolute; top: 3px; left: 3px; box-shadow: 0 1px 2px rgba(0,0,0,0.1);"></div>
            </div>
            <span style="font-size: 13px; font-weight: 500; color: #6b7280;">Translation</span>
          </div>
          <select disabled style="padding: 4px 24px 4px 8px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 12px; color: #9ca3af; background: #f3f4f6; appearance: auto; cursor: not-allowed; opacity: 0.5;">
            <option>Sahih International</option>
          </select>
        </div>
        <div style="display: flex; align-items: center; gap: 10px; padding: 12px 14px; border: 1px solid #e5e7eb; border-radius: 12px; background: #f9fafb;">
          <div style="width: 40px; height: 22px; background: #d1d5db; border-radius: 11px; position: relative; cursor: pointer; flex-shrink: 0;">
            <div style="width: 16px; height: 16px; background: white; border-radius: 50%; position: absolute; top: 3px; left: 3px; box-shadow: 0 1px 2px rgba(0,0,0,0.1);"></div>
          </div>
          <span style="font-size: 13px; font-weight: 500; color: #6b7280;">Transliteration</span>
        </div>
      </div>
    </div>

  </div>
</div>
